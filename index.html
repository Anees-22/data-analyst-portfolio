<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Digital Time Capsule</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>⏳ Digital Time Capsule</h1>
    <p class="subtitle">Write a message to your future self.</p>

    <div class="clock" id="clock"></div>

    <textarea id="message" placeholder="Write something for your future self..."></textarea>

    <button onclick="saveMessage()">Seal the Capsule 🔒</button>
    <button onclick="showMessage()">Open Capsule 🔓</button>

    <div id="savedMessage" class="saved-message"></div>

    <div class="countdown">
      <h3>Countdown to 2027 🎓</h3>
      <div id="countdownTimer"></div>
    </div>
  </div>

<script src="script.js"></script>
</body>
</html>
